name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core

      - name: Rust tests
        working-directory: rust-core
        run: cargo test --lib

      - name: Build Rust (release)
        working-directory: rust-core
        run: cargo build --release

      - name: Generate Swift bindings
        working-directory: rust-core
        run: cargo run --bin uniffi-bindgen generate --library target/release/libtunnel_core.dylib --language swift --out-dir ../macos-app/TunnelMaster/Generated

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: macos-app
        run: xcodegen generate

      - name: Build macOS app (Release)
        working-directory: macos-app
        run: |
          xcodebuild -project TunnelMaster.xcodeproj \
            -scheme TunnelMaster \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Package app
        working-directory: macos-app
        run: |
          APP_PATH="build/Build/Products/Release/Tunnel Master.app"
          # Create zip for GitHub Release
          cd "$(dirname "$APP_PATH")"
          zip -r -y "TunnelMaster-macOS.zip" "Tunnel Master.app"
          mv "TunnelMaster-macOS.zip" "$GITHUB_WORKSPACE/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TunnelMaster-macOS
          path: TunnelMaster-macOS.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: TunnelMaster-macOS

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Tunnel Master v${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: TunnelMaster-macOS.zip
