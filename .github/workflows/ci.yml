name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build & Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core

      - name: Rust tests
        working-directory: rust-core
        run: cargo test --lib

      - name: Build Rust (release)
        working-directory: rust-core
        run: cargo build --release

      - name: Generate Swift bindings
        working-directory: rust-core
        run: cargo run --bin uniffi-bindgen generate --library target/release/libtunnel_core.dylib --language swift --out-dir ../macos-app/TunnelMaster/Generated

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: macos-app
        run: xcodegen generate

      - name: Build macOS app
        working-directory: macos-app
        run: xcodebuild -project TunnelMaster.xcodeproj -scheme TunnelMaster -configuration Debug build
